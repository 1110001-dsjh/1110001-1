<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>打磚塊 霓虹版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:"Segoe UI",Arial,sans-serif;overflow:hidden}
        .game-wrapper{position:relative;display:flex;flex-direction:column;align-items:center;gap:16px}
        .header{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 4px}
        .header h1{color:#fff;font-size:20px;font-weight:700;text-shadow:0 0 20px rgba(100,180,255,.5);letter-spacing:2px}
        .header .info{display:flex;gap:24px;color:#aac;font-size:15px;font-weight:600}
        .header .info span{background:rgba(255,255,255,.08);padding:6px 14px;border-radius:20px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1)}
        .header .info .val{color:#6cf}
        .canvas-wrap{position:relative;border-radius:16px;box-shadow:0 0 40px rgba(100,180,255,.3),0 0 80px rgba(100,180,255,.1);border:2px solid rgba(100,180,255,.3)}
        #gameCanvas{display:block;border-radius:14px;background:#111;width:600px;height:400px;cursor:none}
        .controls{display:flex;gap:12px;color:#889;font-size:13px}
        .controls kbd{background:rgba(255,255,255,.1);padding:2px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.15);color:#aef;font-size:12px}
        .btn{background:linear-gradient(135deg,#6cf,#48f);border:none;color:#fff;padding:8px 24px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px;box-shadow:0 0 20px rgba(100,180,255,.3)}
        .btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(100,180,255,.5)}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);border-radius:14px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;z-index:10;opacity:0;pointer-events:none;transition:opacity .5s,backdrop-filter .5s}
.overlay.show{opacity:1;pointer-events:all;backdrop-filter:blur(6px)}
        .overlay h2{font-size:42px;margin-bottom:8px;text-shadow:0 0 30px rgba(100,180,255,.6)}
        .overlay p{color:#aac;font-size:16px;margin-bottom:24px}
        .overlay .score-final{font-size:48px;font-weight:800;color:#6cf;text-shadow:0 0 30px rgba(100,180,255,.5);margin-bottom:8px}
        .overlay .name-input{display:flex;gap:8px;align-items:center;margin-bottom:20px}
        .overlay .name-input input{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 14px;color:#fff;font-size:16px;width:160px;text-align:center;outline:none;transition:border-color .3s}
        .overlay .name-input input:focus{border-color:#6cf}
        .overlay .name-input input::placeholder{color:#667}
.scoreboard{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);border-radius:14px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;z-index:20;opacity:0;pointer-events:none;transition:opacity .5s,backdrop-filter .5s}
.scoreboard.show{opacity:1;pointer-events:all;backdrop-filter:blur(8px)}
        .scoreboard h2{font-size:32px;margin-bottom:20px;text-shadow:0 0 20px rgba(100,180,255,.5)}
        .scoreboard table{width:80%;max-width:420px;border-collapse:collapse;margin-bottom:20px}
        .scoreboard th{color:#6cf;font-size:14px;padding:8px 12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.15)}
        .scoreboard td{color:#ccd;font-size:14px;padding:7px 12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
        .scoreboard .rank1{color:#ffd700}
        .scoreboard .rank2{color:#c0c0c0}
        .scoreboard .rank3{color:#cd7f32}
        .scoreboard .no-data{color:#556;font-style:italic;padding:20px}
        .scoreboard .actions{display:flex;gap:12px}
        .scoreboard .btn-small{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#aac;padding:6px 16px;border-radius:16px;font-size:12px;cursor:pointer;transition:all .3s}
        .scoreboard .btn-small:hover{background:rgba(255,255,255,.2)}
        .scoreboard .btn-small.danger:hover{background:rgba(255,60,60,.3);border-color:rgba(255,60,60,.4)}
        .start-hint{color:#889;font-size:22px;margin-top:8px;animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="header">
        <h1>打磚塊 · 霓虹版</h1>
        <div class="info">
            <span>得分 <span class="val" id="scoreDisplay">0</span></span>
            <span>最高 <span class="val" id="highScoreDisplay">0</span></span>
            <span>生命 <span class="val" id="livesDisplay">3</span></span>
        </div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="overlay show" id="startOverlay">
            <h2>打磚塊</h2>
            <p>霓虹版</p>
            <div class="start-hint">點擊開始</div>
        </div>
        <div class="overlay" id="gameoverOverlay">
            <h2 id="resultTitle">遊戲結束</h2>
            <div class="score-final" id="finalScore">0</div>
            <p id="newHighText"></p>
            <div class="name-input" id="nameInputArea">
                <input type="text" id="playerName" placeholder="輸入名稱" maxlength="8">
                <button class="btn" id="saveScoreBtn">儲存</button>
            </div>
            <button class="btn" id="restartBtn">再玩一次</button>
            <button class="btn" id="showScoreboardBtn" style="background:rgba(255,255,255,.15);margin-top:8px">排行榜</button>
        </div>
        <div class="scoreboard" id="scoreboardOverlay">
            <h2>排行榜</h2>
            <table>
                <thead><tr><th>#</th><th>名稱</th><th>分數</th><th>日期</th></tr></thead>
                <tbody id="scoreboardBody"></tbody>
            </table>
            <div class="actions">
                <button class="btn" id="scoreboardClose">關閉</button>
                <button class="btn-small danger" id="scoreboardReset">清除紀錄</button>
            </div>
        </div>
    </div>
    <div class="controls">
        <span>滑鼠 / <kbd>&larr;</kbd> <kbd>&rarr;</kbd> 移動球拍</span>
        <button class="btn" id="scoreboardToggle" style="padding:4px 16px;font-size:12px">排行榜</button>
    </div>
</div>
<script>
(function() {
    var c = document.getElementById('gameCanvas');
    var a = c.getContext('2d');
    var W = 600, H = 400;

    // DOM refs
    var S = document.getElementById('scoreDisplay');
    var hS = document.getElementById('highScoreDisplay');
    var lD = document.getElementById('livesDisplay');
    var sO = document.getElementById('startOverlay');
    var gO = document.getElementById('gameoverOverlay');
    var bO = document.getElementById('scoreboardOverlay');
    var rT = document.getElementById('resultTitle');
    var fS = document.getElementById('finalScore');
    var nH = document.getElementById('newHighText');
    var nIA = document.getElementById('nameInputArea');
    var pN = document.getElementById('playerName');
    var sSB = document.getElementById('saveScoreBtn');
    var rBtn = document.getElementById('restartBtn');
    var sSBB = document.getElementById('showScoreboardBtn');
    var sBB = document.getElementById('scoreboardBody');
    var sBC = document.getElementById('scoreboardClose');
    var sBR = document.getElementById('scoreboardReset');
    var sBT = document.getElementById('scoreboardToggle');

    // Game state
    var bx, by, dx, dy;
    var br = 10;
    var ph = 14, pw = 100;
    var px;
    var py = H - ph - 8;
    var bR = 5, bC = 7;
    var bW = 62, bH = 22, bP = 8;
    var bOT = 40;
    var bOL = (W - (bC * (bW + bP) - bP)) / 2;
    var bricks = [];
    var sc = 0, lv = 3;
    var gr = false;
    var ai = null;
    var rP = false, lP = false;
    var pts = [];
    var hs = 0;
    try { hs = parseInt(localStorage.getItem('bh') || '0'); } catch(e) {}
    hS.textContent = hs;

    var rC = [
        {f:'#ff6b6b',g:'rgba(255,107,107,.6)'},
        {f:'#ffa94d',g:'rgba(255,169,77,.6)'},
        {f:'#ffd43b',g:'rgba(255,212,59,.6)'},
        {f:'#69db7c',g:'rgba(105,219,124,.6)'},
        {f:'#4dabf7',g:'rgba(77,171,247,.6)'}
    ];

    function iB() {
        bricks = [];
        for (var r = 0; r < bR; r++) {
            var ro = [];
            for (var cl = 0; cl < bC; cl++) {
                ro.push({x:bOL+cl*(bW+bP), y:bOT+r*(bH+bP), w:bW, h:bH, s:1, c:rC[r%rC.length]});
            }
            bricks.push(ro);
        }
    }

    function rB() {
        bx = W / 2; by = H - 50;
        dx = 3 * (Math.random() > 0.5 ? 1 : -1); dy = -3;
        px = (W - pw) / 2;
    }

    function rG() {
        sc = 0; lv = 3; pts = [];
        uU(); iB(); rB();
    }

    function uU() {
        S.textContent = sc;
        lD.textContent = lv;
    }

    function sP(x, y, co) {
        for (var i = 0; i < 12; i++) {
            var an = Math.random() * Math.PI * 2;
            var sp = 1 + Math.random() * 3;
            pts.push({x:x, y:y, vx:Math.cos(an)*sp, vy:Math.sin(an)*sp, l:1, d:.015+Math.random()*.025, sz:2+Math.random()*4, c:co});
        }
    }

    function uP() {
        for (var i = pts.length - 1; i >= 0; i--) {
            var p = pts[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.l -= p.d;
            if (p.l <= 0) pts.splice(i, 1);
        }
    }

    function dP() {
        for (var i = 0; i < pts.length; i++) {
            var p = pts[i];
            a.globalAlpha = p.l;
            a.beginPath(); a.arc(p.x, p.y, p.sz * p.l, 0, Math.PI * 2);
            a.fillStyle = p.c; a.fill();
        }
        a.globalAlpha = 1;
    }

    function dBg() {
        var g = a.createRadialGradient(300,200,50,300,200,400);
        g.addColorStop(0,'#1a1a2e'); g.addColorStop(0.5,'#16213e'); g.addColorStop(1,'#0f0f1a');
        a.fillStyle = g; a.fillRect(0,0,W,H);
        a.strokeStyle = 'rgba(255,255,255,.03)'; a.lineWidth = 1;
        for (var x = 0; x < W; x += 40) { a.beginPath(); a.moveTo(x,0); a.lineTo(x,H); a.stroke(); }
        for (var y = 0; y < H; y += 40) { a.beginPath(); a.moveTo(0,y); a.lineTo(W,y); a.stroke(); }
    }

    function dBa() {
        a.shadowColor = 'rgba(100,200,255,.8)'; a.shadowBlur = 20;
        var g = a.createRadialGradient(bx-3,by-3,2,bx,by,br);
        g.addColorStop(0,'#fff'); g.addColorStop(0.4,'#7af'); g.addColorStop(1,'#37f');
        a.beginPath(); a.arc(bx,by,br,0,Math.PI*2); a.fillStyle = g; a.fill();
        a.shadowBlur = 0;
    }

    function dPdl() {
        a.shadowColor = 'rgba(100,180,255,.5)'; a.shadowBlur = 15;
        var rr = 7;
        a.beginPath();
        a.moveTo(px+rr,py); a.lineTo(px+pw-rr,py);
        a.quadraticCurveTo(px+pw,py,px+pw,py+rr);
        a.lineTo(px+pw,py+ph-rr);
        a.quadraticCurveTo(px+pw,py+ph,px+pw-rr,py+ph);
        a.lineTo(px+rr,py+ph);
        a.quadraticCurveTo(px,py+ph,px,py+ph-rr);
        a.lineTo(px,py+rr);
        a.quadraticCurveTo(px,py,px+rr,py);
        a.closePath();
        var g = a.createLinearGradient(px,py,px,py+ph);
        g.addColorStop(0,'#6cf'); g.addColorStop(1,'#47f');
        a.fillStyle = g; a.fill();
        a.shadowBlur = 0;
        a.strokeStyle = 'rgba(255,255,255,.3)'; a.lineWidth = 1;
        a.beginPath(); a.moveTo(px+10,py+3); a.lineTo(px+pw-10,py+3); a.stroke();
    }

    function dBr() {
        for (var r = 0; r < bR; r++) {
            for (var cl = 0; cl < bC; cl++) {
                var b = bricks[r][cl];
                if (b.s === 0) continue;
                a.shadowColor = b.c.g; a.shadowBlur = 10;
                var g = a.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
                g.addColorStop(0,b.c.f); g.addColorStop(1,dC(b.c.f));
                a.fillStyle = g; rR(a,b.x,b.y,b.w,b.h,4); a.fill();
                a.fillStyle = 'rgba(255,255,255,.2)';
                rR(a,b.x+3,b.y+2,b.w-6,b.h/3,2); a.fill();
                a.shadowBlur = 0;
            }
        }
    }

    function rR(a,x,y,w,h,r) {
        a.beginPath();
        a.moveTo(x+r,y); a.lineTo(x+w-r,y);
        a.quadraticCurveTo(x+w,y,x+w,y+r);
        a.lineTo(x+w,y+h-r);
        a.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        a.lineTo(x+r,y+h);
        a.quadraticCurveTo(x,y+h,x,y+h-r);
        a.lineTo(x,y+r);
        a.quadraticCurveTo(x,y,x+r,y);
        a.closePath();
    }

    function dC(hx) {
        var r = parseInt(hx.slice(1,3),16), g = parseInt(hx.slice(3,5),16), b = parseInt(hx.slice(5,7),16);
        return 'rgb('+Math.max(0,r-60)+','+Math.max(0,g-60)+','+Math.max(0,b-60)+')';
    }

    function dS() {
        a.font = 'bold 14px "Segoe UI",Arial,sans-serif';
        a.fillStyle = 'rgba(255,255,255,.15)';
        a.fillText('\u5f97\u5206 '+sc, 12, 28);
        a.fillStyle = 'rgba(255,255,255,.1)';
        var ls = '\u2665 '.repeat(lv).trim();
        a.fillText(ls, W - a.measureText(ls).width - 12, 28);
    }

    function cD() {
        for (var r = 0; r < bR; r++) {
            for (var cl = 0; cl < bC; cl++) {
                var b = bricks[r][cl];
                if (b.s === 0) continue;
                var cx = Math.max(b.x, Math.min(bx, b.x+b.w));
                var cy = Math.max(b.y, Math.min(by, b.y+b.h));
                var ddx = bx - cx, ddy = by - cy;
                if (ddx*ddx + ddy*ddy < br*br) {
                    dy = -dy; b.s = 0;
                    sc += 10 * (bR - r);
                    sP(b.x+b.w/2, b.y+b.h/2, b.c.f);
                    uU(); cW(); return;
                }
            }
        }
    }

    function cW() {
        var remaining = bricks.flat().filter(function(b){return b.s===1}).length;
        if (remaining === 0) { gr = false; sG(true); }
    }

    function sG(won) {
        if (ai) { cancelAnimationFrame(ai); ai = null; }
        rT.textContent = won ? '\u606d\u559c\u904e\u95dc' : '\u904a\u6232\u7d50\u675f';
        fS.textContent = sc;
        var nh = sc > hs;
        if (nh && sc > 0) {
            hs = sc; try { localStorage.setItem('bh', String(hs)); } catch(e) {}
            hS.textContent = hs;
            nH.textContent = '\u65b0\u6700\u9ad8\u5206\uff01'; nH.style.color = '#ffd700';
        } else { nH.textContent = ''; }
        nIA.style.display = sc > 0 ? 'flex' : 'none';
        gO.classList.add('show');
    }

    function gL() {
        if (!gr) return;
        if (rP && px < W - pw) px += 7;
        if (lP && px > 0) px -= 7;
        bx += dx; by += dy;
        if (bx+dx > W-br || bx+dx < br) dx = -dx;
        if (by+dy < br) dy = -dy;
        if (by+dy > py-br && by+dy < py+ph+br && bx > px && bx < px+pw) {
            var hp = (bx-px)/pw, an = (hp-0.5)*Math.PI*0.7, sp = Math.sqrt(dx*dx+dy*dy);
            dx = sp * Math.sin(an); dy = -sp * Math.cos(an);
        }
        if (by+dy > H - br) {
            lv--; uU();
            if (lv <= 0) { gr = false; sG(false); return; }
            rB();
        }
        cD(); uP();
        dBg(); dBr(); dPdl(); dP(); dBa(); dS();
        a.fillStyle = 'rgba(100,200,255,.04)';
        a.beginPath(); a.arc(bx-dx*2, by-dy*2, br*0.6, 0, Math.PI*2); a.fill();
        ai = requestAnimationFrame(gL);
    }

    function gSc() {
        try { return JSON.parse(localStorage.getItem('bs') || '[]'); } catch(e) { return []; }
    }

    function sSc(s) { try { localStorage.setItem('bs', JSON.stringify(s)); } catch(e) {} }

    function aSc(n, p) {
        var s = gSc();
        s.push({name:n||'\u533f\u540d', score:p, date:new Date().toLocaleDateString('zh-TW')});
        s.sort(function(a,b){return b.score-a.score});
        if (s.length > 10) s.length = 10;
        sSc(s); rSb();
    }

    function rSb() {
        var s = gSc(), tb = sBB;
        if (s.length === 0) {
            tb.innerHTML = '<tr><td colspan="4" class="no-data">\u5c1a\u7121\u7d00\u9304</td></tr>';
            return;
        }
        tb.innerHTML = s.map(function(s,i) {
            var rc = i===0?'rank1':i===1?'rank2':i===2?'rank3':'';
            var md = i===0?'\uD83C\uDFC6':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':'';
            return '<tr><td class="'+rc+'">'+(md||(i+1))+'</td><td>'+eH(s.name)+'</td><td>'+s.score+'</td><td>'+s.date+'</td></tr>';
        }).join('');
    }

    function eH(s) {
        var d = document.createElement('div');
        d.textContent = s; return d.innerHTML;
    }

    function kD(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') { rP = true; e.preventDefault(); }
        if (e.key === 'ArrowLeft' || e.key === 'Left') { lP = true; e.preventDefault(); }
    }
    function kU(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') { rP = false; e.preventDefault(); }
        if (e.key === 'ArrowLeft' || e.key === 'Left') { lP = false; e.preventDefault(); }
    }
    document.addEventListener('keydown', kD);
    document.addEventListener('keyup', kU);

    c.addEventListener('mousemove', function(e) {
        if (!gr) return;
        var rect = c.getBoundingClientRect();
        var sx = W / rect.width;
        var mx = (e.clientX - rect.left) * sx;
        px = Math.max(0, Math.min(W - pw, mx - pw/2));
    });

    function sGm() {
        sO.classList.remove('show'); gO.classList.remove('show');
        rG(); gr = true;
        if (ai) cancelAnimationFrame(ai);
        gL();
    }

    sO.addEventListener('click', sGm);
    rBtn.addEventListener('click', sGm);

    sSB.addEventListener('click', function() {
        var n = pN.value.trim() || '\u533f\u540d';
        aSc(n, sc); nIA.style.display = 'none';
    });

    pN.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sSB.click();
    });

    function sSb() { rSb(); bO.classList.add('show'); }
    function hSb() { bO.classList.remove('show'); }

    sSBB.addEventListener('click', sSb);
    sBT.addEventListener('click', sSb);
    sBC.addEventListener('click', hSb);

    sBR.addEventListener('click', function() {
        if (confirm('\u78ba\u5b9a\u6e05\u9664\u6240\u6709\u6392\u884c\u699c\u7d00\u9304\uff1f')) {
            try { localStorage.removeItem('bs'); localStorage.removeItem('bh'); } catch(e) {} rSb();
        }
    });

    rG(); dBg(); dBr(); dPdl(); dBa(); rSb();
})();
</script>
</body>
</html>
